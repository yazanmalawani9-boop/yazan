<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Valsartan AT1 VR Scene</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  </head>

  <body>
    <a-scene background="color: #0a0a0a">

      <!-- Lights -->
      <a-entity light="type: ambient; intensity: 0.6"></a-entity>
      <a-entity light="type: point; intensity: 1" position="2 4 4"></a-entity>

      <!-- Camera (VR enabled) -->
      <a-entity position="0 1.6 5">
        <a-camera></a-camera>
      </a-entity>

      <!-- AT1 receptor (target) -->
      <a-sphere position="0 1.5 -3"
                radius="1.5"
                color="#888888"
                opacity="0.9">
      </a-sphere>

      <!-- binding pocket glow -->
      <a-ring position="0 1.5 -3"
              radius-inner="0.5"
              radius-outer="0.8"
              color="#00ffff"
              animation="property: rotation; to: 0 360 0; loop: true; dur: 6000">
      </a-ring>

      <!-- Valsartan molecule -->
      <a-sphere id="drug"
                position="-3 1.5 -3"
                radius="0.3"
                color="#ff0000"
                animation="property: position; to: 0 1.5 -3; dur: 5000; easing: easeInOutQuad; startEvents: click">
      </a-sphere>

      <!-- Path line (visual guide) -->
      <a-entity line="start: -3 1.5 -3; end: 0 1.5 -3; color: yellow"></a-entity>

      <!-- Instruction text -->
      <a-text value="Click red sphere to simulate Valsartan binding to AT1 receptor"
              position="-2 3 -3"
              color="white"
              width="6">
      </a-text>

    </a-scene>
  </body>
</html>
